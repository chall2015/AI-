<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI 时光机</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-[#111] text-[#333] font-sans antialiased touch-none overflow-hidden h-[100dvh]">
    <div id="app" class="app-container crt-overlay">
      <!-- Universal Snow Screen Effect Layer -->
      <div class="absolute inset-0 snow-screen pointer-events-none z-10"></div>

      <!-- Main Content Container -->
      <div id="steps-container" class="flex-1 flex flex-col relative w-full h-full">
        <!-- Landing Step (Initial state) -->
        <div id="step-landing" class="step-view active h-full flex flex-col items-center justify-between p-8">
          <div class="pt-8 w-full flex justify-end">
            <button id="audio-toggle" class="p-3 rounded-full bg-white/50 backdrop-blur-sm border border-stone-200 z-30">
              <i data-lucide="music-2" class="w-5 h-5 text-orange-500"></i>
            </button>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center space-y-12 w-full">
            <div class="relative">
              <div class="absolute -inset-8 border-2 border-dashed border-orange-400/30 rounded-full animate-[spin_30s_linear_infinite]"></div>
              <div class="w-48 h-48 rounded-full bg-orange-100 flex items-center justify-center border-4 border-orange-400 shadow-2xl relative">
                <div class="animate-[pulse_2s_ease-in-out_infinite]">
                  <i data-lucide="clock" class="w-20 h-20 text-orange-500"></i>
                </div>
              </div>
            </div>
            <div class="space-y-4">
              <h1 class="text-5xl font-bold text-orange-900 tracking-tighter font-retro">AI 时光机</h1>
              <p class="text-stone-500 font-medium">回到小时候 · 重拾那份纯真</p>
            </div>
          </div>
          <button id="btn-start" class="w-full py-5 bg-orange-500 text-white rounded-2xl font-bold text-xl shadow-[0_8px_0_0_#C2410C] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3 group">
            启动时光机
            <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
          </button>
        </div>

        <!-- Selection Step -->
        <div id="step-select" class="step-view h-full flex flex-col p-6 pt-[max(1.5rem,env(safe-area-inset-top))] pb-[max(1.5rem,env(safe-area-inset-bottom))] space-y-6 bg-stone-50">
          <div class="flex items-center gap-4">
            <button id="btn-back-to-landing" class="p-2 bg-white rounded-xl border border-stone-200 shadow-sm">
              <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-xl font-bold">选择你的童年频道</h2>
          </div>
          <div id="styles-list" class="flex-1 space-y-4 overflow-y-auto">
            <!-- Styles populated by JS -->
          </div>
          <div class="relative pt-4">
            <input type="file" id="image-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20" />
            <button class="w-full py-5 bg-orange-500 text-white rounded-2xl font-bold text-lg shadow-[0_6px_0_0_#C2410C] flex items-center justify-center gap-2 pointer-events-none">
              <i data-lucide="camera" class="w-5 h-5"></i> 开始穿越
            </button>
            <p class="text-center text-[10px] text-stone-400 mt-3">请上传清晰正面照，还原效果更好哦</p>
          </div>
        </div>

        <!-- Processing Step -->
        <div id="step-processing" class="step-view h-full flex flex-col p-8 pt-[max(2rem,env(safe-area-inset-top))] pb-[max(2rem,env(safe-area-inset-bottom))] bg-stone-900 text-white items-center justify-center space-y-12">
          <div class="relative">
            <div class="w-32 h-32 border-4 border-t-orange-500 border-stone-700 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="text-orange-500 font-pixel text-lg animate-pulse">AI...</div>
            </div>
          </div>
          <div class="w-full space-y-6 text-center">
            <div class="space-y-2">
              <h3 class="text-xl font-bold tracking-tight">正在重启时光机...</h3>
              <p id="processing-style-text" class="text-sm text-stone-400 font-medium"></p>
            </div>
            <div id="quiz-card" class="bg-white/5 border border-white/10 rounded-2xl p-6 text-left space-y-4">
              <div class="flex items-center justify-between">
                <span class="text-[10px] font-bold text-orange-500 flex items-center gap-1 uppercase tracking-widest">
                  <i data-lucide="gamepad-2" class="w-3 h-3"></i> 童年记忆挑战
                </span>
                <span id="quiz-progress" class="text-[10px] text-stone-500 font-mono">1/4</span>
              </div>
              <p id="quiz-question" class="text-sm font-medium leading-relaxed"></p>
              <div id="quiz-options" class="grid gap-2"></div>
            </div>
          </div>
        </div>

        <!-- Result Step -->
        <div id="step-result" class="step-view h-full flex flex-col bg-white pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
          <div class="relative w-full aspect-[3/4] overflow-hidden bg-stone-200">
            <img id="result-img" class="w-full h-full object-cover" src="" alt="" />
            <div class="absolute inset-0 border-[16px] border-white/30 pointer-events-none"></div>
            <div class="absolute bottom-6 right-6">
              <span class="px-4 py-2 bg-orange-600/90 backdrop-blur-md rounded-full text-[10px] text-white font-bold tracking-widest border border-white/20 flex items-center gap-2 shadow-2xl">
                <i data-lucide="sparkles" class="w-3 h-3"></i> CHILDHOOD VERSION
              </span>
            </div>
          </div>
          <div class="p-8 flex-1 flex flex-col justify-center gap-4">
            <button id="btn-video" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold text-lg shadow-[0_4px_0_0_#C2410C] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3 group">
              <i data-lucide="music-2" class="w-6 h-6"></i> 生成童年专属视频
            </button>
            <div class="grid grid-cols-2 gap-3">
              <button id="btn-poster" class="flex items-center justify-center gap-2 py-4 bg-white border-2 border-stone-100 rounded-2xl font-bold text-stone-600 transition-all hover:border-orange-200 hover:bg-orange-50/30">
                <i data-lucide="share-2" class="w-4 h-4 text-stone-400"></i>
                <span>保存海报</span>
              </button>
              <button id="btn-blindbox" class="flex items-center justify-center gap-2 py-4 bg-white border-2 border-stone-100 rounded-2xl font-bold text-stone-600 transition-all hover:border-orange-200 hover:bg-orange-50/30">
                <i data-lucide="gift" class="w-4 h-4 text-orange-500"></i>
                <span>时光盲盒</span>
              </button>
            </div>
            <button id="btn-restart" class="w-full py-4 bg-stone-100 text-stone-500 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors hover:bg-stone-200">
              <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重新生成
            </button>
          </div>
        </div>

        <!-- Share Step -->
        <div id="step-share" class="step-view h-full flex flex-col p-6 pt-[max(1.5rem,env(safe-area-inset-top))] pb-[max(1.5rem,env(safe-area-inset-bottom))] space-y-6">
          <div class="flex-1 bg-white shadow-2xl rounded-[32px] p-6 flex flex-col space-y-6 border border-stone-100 relative overflow-hidden">
            <div class="flex justify-between items-center px-2">
              <div>
                <h4 class="text-2xl font-black text-stone-800 tracking-tighter">AI 时光报</h4>
                <p class="text-[8px] text-stone-400 uppercase tracking-[0.2em] font-bold">Retro Edition · 2024</p>
              </div>
              <div class="text-right text-[10px] text-stone-300 font-mono">#TS20240601</div>
            </div>
            <div class="flex-1 rounded-2xl overflow-hidden border border-stone-200">
              <img id="share-img" class="w-full h-full object-cover" src="" alt="" />
            </div>
            <div class="space-y-4 px-2">
              <p id="share-copy" class="text-lg font-bold text-stone-700 italic border-l-4 border-orange-400 pl-4"></p>
              <div class="flex items-center gap-4 pt-4 border-t border-stone-100">
                <div class="w-12 h-12 bg-stone-800 rounded-lg flex items-center justify-center text-white shrink-0">
                  <i data-lucide="camera" class="w-6 h-6"></i>
                </div>
                <div class="flex-1">
                  <p class="text-xs font-bold text-stone-800">扫码开启时光之约</p>
                  <p class="text-[8px] text-stone-400 font-medium">致敬那个永不褪色的童年</p>
                </div>
                <div class="w-12 h-12 bg-stone-100 rounded-lg shrink-0 border-2 border-dashed border-stone-200"></div>
              </div>
            </div>
          </div>
          <div class="flex gap-4">
            <button id="btn-share-back" class="flex-1 py-4 bg-stone-100 rounded-2xl font-bold text-stone-500">返回</button>
            <button class="flex-[2] py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg">立即保存</button>
          </div>
        </div>
      </div>

      <!-- Blind Box Overlay -->
      <div id="blind-box-overlay" class="hidden absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-8">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-xs text-center space-y-6">
          <div class="w-20 h-20 bg-orange-100 rounded-2xl flex items-center justify-center mx-auto border-4 border-orange-200">
            <i data-lucide="gift" class="w-10 h-10 text-orange-500"></i>
          </div>
          <div class="space-y-2">
            <h3 class="text-xl font-bold">恭喜获得！</h3>
            <p id="blind-box-reward" class="text-orange-600 font-bold text-lg py-2 px-4 bg-orange-50 rounded-xl border border-orange-100"></p>
          </div>
          <button id="btn-close-blindbox" class="w-full py-4 bg-stone-900 text-white rounded-2xl font-bold">收下奖励</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Initialize icons
      lucide.createIcons();
    </script>
  </body>
</html>
